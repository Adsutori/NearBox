{% load static %}
<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NearBox | Mapa</title>
    <link rel="icon" type="image/x-icon" href="{% static 'media/img/favicon.ico' %}">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Wczytaj motyw PRZED renderem — zero flash -->
    <script>
        (function() {
            const t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>

<script>
    const INPOST_LOGO_URL = "{% static 'media/img/inpost-logo.png' %}";
</script>

<div id="app">

    <!-- ── HEADER ── -->
    <header id="header">

        <a href="/" id="logo">
            <span class="nav-logo">NearBox</span>
        </a>

        <div id="search-bar">
            <div class="input-wrapper">
                <i data-lucide="search" class="input-icon"></i>
                <input type="text" id="city-input" placeholder="Wpisz miejscowość…"/>
            </div>
            <button class="btn btn-primary" onclick="fetchPoints()">
                <i data-lucide="search"></i>
                <span>Szukaj</span>
            </button>
            <button class="btn btn-ghost" onclick="useMyLocation()">
                <i data-lucide="locate-fixed"></i>
                <span>Moja lokalizacja</span>
            </button>
        </div>

        <div id="filters">
            <label class="chip">
                <input type="checkbox" id="filter-locker">
                <i data-lucide="package"></i>
                <span>Paczkomaty</span>
            </label>
            <label class="chip">
                <input type="checkbox" id="filter-247">
                <i data-lucide="clock"></i>
                <span>24/7</span>
            </label>
            <label class="chip">
                <input type="checkbox" id="filter-operating" checked>
                <i data-lucide="check-circle"></i>
                <span>Aktywne</span>
            </label>
            <label class="chip">
                <input type="checkbox" id="filter-outdoor">
                <i data-lucide="tree-pine"></i>
                <span>Na zewnątrz</span>
            </label>
            <label class="chip">
                <input type="checkbox" id="filter-easy-access">
                <i data-lucide="accessibility"></i>
                <span>Łatwy dostęp</span>
            </label>
        </div>

        <div id="status"></div>

        <!-- ── THEME TOGGLE ── -->
        <button id="theme-toggle" title="Przełącz motyw">
            <i data-lucide="sun"  id="icon-sun"></i>
            <i data-lucide="moon" id="icon-moon"></i>
        </button>

    </header>

    <!-- ── MAPA ── -->
    <div id="map"></div>

    <!-- ── PANEL AI ── -->
    <div id="ai-panel">
        <div id="ai-section">
            <div id="ai-label">
                <i data-lucide="bot"></i>
                <span>Zapytaj AI</span>
            </div>
            <div class="input-wrapper">
                <i data-lucide="message-circle" class="input-icon"></i>
                <input id="ai-input" type="text"
                       placeholder="np. paczkomat przy Pałacu Kultury i Nauki"/>
            </div>
            <button class="btn btn-yellow" onclick="askAI()">
                <i data-lucide="send"></i>
                <span>Wyślij</span>
            </button>
        </div>
        <div id="ai-response"></div>
    </div>

    <!-- ── MODAL ŁADOWANIA ── -->
    <div id="loading-modal">
        <div id="loading-box">
            <div class="spinner"></div>
            <p id="loading-text">Szukam paczkomatów…</p>

            <!-- pasek postępu — widoczny tylko podczas streamowania -->
            <div id="loading-progress" style="display:none;">
                <div id="progress-bar-wrap">
                    <div id="progress-bar"></div>
                </div>
                <span id="progress-label">0 znalezionych</span>
            </div>
        </div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{% static 'js/main.js' %}"></script>
<script>lucide.createIcons();</script>

</body>
</html>
