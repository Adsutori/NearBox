{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InPost Locker Finder</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<script>
    const INPOST_LOGO_URL = "{% static 'media/img/inpost-logo.png' %}";
</script>

<div id="app">

    <!-- ── HEADER ── -->
    <div id="header">
        <svg viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg"
             style="height:32px; flex-shrink:0;">
            <rect width="120" height="40" rx="6" fill="#1a1a1a"/>
            <text x="10" y="27" font-family="Segoe UI, sans-serif"
                  font-size="18" font-weight="700" fill="#ffd402">InPost</text>
        </svg>

        <div id="search-bar">
            <input type="text" id="city-input"
                   placeholder="Wpisz miasto, np. Warszawa"/>
            <button class="btn btn-dark" onclick="fetchPoints()">🔍 Szukaj</button>
            <button class="btn btn-dark" onclick="useMyLocation()">📍 Moja lokalizacja</button>
        </div>

        <div id="filters">
            <label><input type="checkbox" id="filter-locker"> Tylko paczkomaty</label>
            <label><input type="checkbox" id="filter-247"> Czynne 24/7</label>
            <label><input type="checkbox" id="filter-operating" checked> Tylko aktywne</label>
            <label><input type="checkbox" id="filter-outdoor"> Na zewnątrz</label>
            <label><input type="checkbox" id="filter-easy-access"> Łatwy dostęp</label>
        </div>

        <span id="status"></span>
    </div>

    <!-- ── MAPA ── -->
    <div id="map"></div>

    <!-- ── PANEL AI ── -->
    <div id="ai-panel">
        <div id="ai-section">
            <span id="ai-label">🤖 Zapytaj AI:</span>
            <input id="ai-input" type="text"
                   placeholder="np. paczkomat czynny całą dobę blisko centrum"/>
            <button class="btn btn-yellow" onclick="askAI()">Zapytaj</button>
        </div>
        <div id="ai-response"></div>
    </div>

    <!-- ── MODAL ŁADOWANIA ── -->
    <div id="loading-modal">
        <div id="loading-box">
            <div class="spinner"></div>
            <p id="loading-text">Ładowanie punktów...</p>
        </div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
